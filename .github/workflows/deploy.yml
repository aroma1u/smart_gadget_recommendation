name: CI/CD - Build & Deploy to AWS EC2 (Flutter Web)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --no-tree-shake-icons

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smart-gadget-flutter:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/smart-gadget-flutter

            cat > ~/smart-gadget-flutter/compose.yaml << EOF
            version: "3.8"
            services:
              smart-gadget-web:
                image: ${{ secrets.DOCKER_USERNAME }}/smart-gadget-flutter:latest
                container_name: smart-gadget-app
                restart: unless-stopped
                ports:
                  - "80:80"
                networks:
                  - webnet
            networks:
              webnet:
                driver: bridge
            EOF

            cd ~/smart-gadget-flutter
            docker pull ${{ secrets.DOCKER_USERNAME }}/smart-gadget-flutter:latest
            docker compose down || true
            docker compose up -d
            docker image prune -f
            echo "Deployment complete!"
